name: publish-pypi

on:
  push:
    tags:
      - v*

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bedrockflow/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v${TAG} does not match pyproject.toml version ${VERSION}"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Smoke test wheel (no AWS extra)
        run: |
          uv venv /tmp/publish-venv
          uv pip install --python /tmp/publish-venv/bin/python dist/bedrockflow-*.whl
          /tmp/publish-venv/bin/python -c \
            "from bedrockflow import markdown_sections, __version__; assert __version__; markdown_sections('## Summary')"
          /tmp/publish-venv/bin/bedrockflow eval tests/fixtures/simple/good.md \
            --panel bedrockflow.examples.simple_evals:SIMPLE_EVALS

      - name: Publish to PyPI
        run: uv publish
